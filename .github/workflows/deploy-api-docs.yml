name: Deploy REST API docs
on:
    push:
        branches:
            - develop
            - trunk
    workflow_dispatch:

jobs:
    build-and-deploy:
        if: github.repository_owner == 'Automattic'
        name: Build and deploy
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - name: Build
              run: cd docs/rest-api && ./build.sh
            - name: Deploy to GitHub Pages
              if: success()
              uses: crazy-max/ghaction-github-pages@1d6ee9b181a81033a16bd707a1401afa978daab4 # v5.0.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  target_branch: gh-pages
                  build_dir: 'docs/rest-api/build'
